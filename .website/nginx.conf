worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ✅ Serve Markdown files as text (so browser renders them as readable content)
    types {
        text/markdown md markdown;
        text/plain md markdown;
    }

    map $http_accept $want_markdown {
        default 0;
        "~*text/markdown" 1;
    }

    sendfile on;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;

        location ~ ^/(.*)\.html$ {
            # Capture the filename without extension (e.g., "introduction")
            set $filename $1;
            
            # Assume we won't rewrite initially
            set $serve_md 0;

            # Condition A: Header is present
            if ($want_markdown) {
                set $serve_md 1;
            }

            # Condition B: File MUST exist
            # If the .md file is NOT found, cancel the rewrite flag
            if (!-f $document_root/$filename.md) {
                set $serve_md 0;
            }

            # If both conditions pass, serve the markdown file
            if ($serve_md) {
                rewrite ^ /$filename.md last;
            }

            # Fallback: Serve the original .html file if .md didn't exist or wasn't asked for
            try_files $uri =404;
        }

        # Handle standard files and hand off routing
        location / {
            # Try the exact file ($uri). If not found, hand off to our custom routing.
            try_files $uri @extensionless;
        }

        # Custom logic for clean URLs and directories
        location @extensionless {
            # 1. Redirect trailing slashes to non-trailing slashes (SEO friendly & fixes 403s)
            # Example: /blog/serinus_2_1/ -> 301 redirect to /blog/serinus_2_1
            rewrite ^/(.+)/$ /$1 permanent;

            # 2. Check if the exact .html file exists and internally rewrite
            if (-f $document_root$uri.html) {
                rewrite ^(.*)$ $1.html last;
            }

            # 3. Check if it's a directory containing an index.html 
            # (e.g. for the home page "/" or a specific "/blog" index)
            if (-f $document_root$uri/index.html) {
                rewrite ^(.*)$ $1/index.html last;
            }

            # 4. If nothing matches, return 404
            return 404;
        }
    }
}